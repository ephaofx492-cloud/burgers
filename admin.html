<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE ONE | Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-container { max-width: 1200px; margin: 100px auto; padding: 0 20px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: var(--bg-card); padding: 25px; border-radius: 12px; border: 1px solid #333; text-align: center; }
        .stat-value { font-size: 2rem; font-weight: 700; color: var(--gold); margin-top: 10px; }
        .stat-label { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }

        .admin-table-container { background: var(--bg-card); border-radius: 12px; border: 1px solid #333; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; color: white; }
        th { background: #1a1a1a; padding: 15px; text-align: left; font-size: 0.8rem; text-transform: uppercase; color: var(--text-muted); }
        td { padding: 15px; border-bottom: 1px solid #222; font-size: 0.9rem; }
        tr:hover { background: rgba(255,255,255,0.02); }

        .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; }
        .status-pending { background: rgba(212, 175, 55, 0.1); color: var(--gold); }
        .status-preparing { background: rgba(255, 46, 46, 0.1); color: var(--primary); }
        .status-ready { background: rgba(46, 255, 113, 0.1); color: #2eff71; }
        .status-delivered { background: rgba(100, 100, 100, 0.1); color: #888; }

        .action-btn { padding: 6px 12px; border-radius: 4px; border: 1px solid #444; background: #222; color: white; cursor: pointer; font-size: 0.8rem; margin-right: 5px; }
        .action-btn:hover { border-color: var(--gold); background: #333; }
        
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
    </style>
     
      <!-- ADD THIS LINE: This loads the Supabase tool -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

</head>
<body style="padding-bottom: 0;">

    <header>
        <div class="nav-container">
            <div class="logo">ADMIN <span style="color:var(--gold)">DASHBOARD</span></div>
            <div class="nav-actions">
                <a href="index.html" style="color:white; text-decoration:none; font-weight:700;">Back to App</a>
            </div>
        </div>
    </header>

    <div class="admin-container">
        <div class="admin-header">
            <h2>Business Overview</h2>
            <button class="action-btn" onclick="admin.clearOrders()" style="color:var(--primary); border-color:var(--primary);">Clear All History</button>
        </div>

        <!-- Connection Status Banner -->
        <div id="db-status" style="margin-bottom:20px; padding:12px 18px; border-radius:8px; font-size:0.85rem; font-weight:600; display:flex; align-items:center; gap:10px; background:rgba(212,175,55,0.1); border:1px solid rgba(212,175,55,0.3); color:#d4af37;">
            <span id="db-status-dot" style="width:10px;height:10px;border-radius:50%;background:#d4af37;display:inline-block;animation:pulse 1.5s infinite;"></span>
            <span id="db-status-text">Connecting to Supabase...</span>
        </div>
        <style>@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}</style>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Total Orders</div>
                <div class="stat-value" id="statOrders">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total Revenue</div>
                <div class="stat-value" id="statRevenue">0 ETB</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Pending Orders</div>
                <div class="stat-value" id="statPending">0</div>
            </div>
        </div>

        <h3 style="margin-bottom:20px;">Recent Orders</h3>
        <div class="admin-table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Customer</th>
                        <th>Items</th>
                        <th>Total</th>
                        <th>Payment</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="adminOrderTable">
                    <!-- Injected via JS -->
                </tbody>
            </table>
        </div>
    </div>

    <script src="admin.js"></script>

</body>
</html>
